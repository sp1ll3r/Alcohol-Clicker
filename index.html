<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcohol Clicker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        /* Better styling */
        .container { display: flex; flex-direction: column; align-items: center; }
        /* Mobile optimization */
        @media (max-width: 600px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Alcohol Clicker!</h1>
        <div id="upgrades">
            <h2>Upgrades</h2>
            <ul>
                <li>New Upgrade 1</li>
                <li>New Upgrade 2</li>
                <li>New Upgrade 3</li>
            </ul>
        </div>
        <div id="prestige">
            <h2>Prestige System</h2>
            <p>Prestige allows you to reset your progress for special benefits!</p>
        </div>
        <div id="animations">
            <p>Enjoy our new smooth animations!</p>
        </div>
        <div id="passive-income">
            <h2>Passive Income</h2>
            <p>Your investments earn money over time!</p>
        </div>
    </div>
</body>
</html>
