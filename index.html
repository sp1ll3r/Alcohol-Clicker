<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcohol Clicker Game</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .button { padding: 20px; font-size: 24px; cursor: pointer; }
        .stats { margin: 20px; }
    </style>
</head>
<body>
    <h1>Alcohol Clicker Game</h1>
    <div class="stats">
        <p>Alcohol: <span id="alcohol-count">0</span></p>
        <p>Upgrades: <span id="upgrades-count">0</span></p>
    </div>
    <button class="button" id="click-button">Click for Alcohol!</button>
    <button class="button" id="upgrade-button">Buy Upgrade (Cost: <span id="upgrade-cost">5</span> Alcohol)</button>
    <script>
        let alcohol = 0;
        let upgrades = 0;
        let upgradeCost = 5;

        document.getElementById('click-button').addEventListener('click', () => {
            alcohol += (1 + upgrades);
            document.getElementById('alcohol-count').innerText = alcohol;
        });

        document.getElementById('upgrade-button').addEventListener('click', () => {
            if (alcohol >= upgradeCost) {
                alcohol -= upgradeCost;
                upgrades++;
                document.getElementById('upgrades-count').innerText = upgrades;
                document.getElementById('alcohol-count').innerText = alcohol;
                upgradeCost = Math.floor(upgradeCost * 1.5);
                document.getElementById('upgrade-cost').innerText = upgradeCost;
            } else {
                alert('Not enough alcohol to buy an upgrade!');
            }
        });

        window.onload = () => {
            const savedData = JSON.parse(localStorage.getItem('alcoholClicker')) || {};
            alcohol = savedData.alcohol || 0;
            upgrades = savedData.upgrades || 0;
            upgradeCost = savedData.upgradeCost || 5;
            document.getElementById('alcohol-count').innerText = alcohol;
            document.getElementById('upgrades-count').innerText = upgrades;
            document.getElementById('upgrade-cost').innerText = upgradeCost;
        };

        window.onbeforeunload = () => {
            const gameData = { alcohol, upgrades, upgradeCost };
            localStorage.setItem('alcoholClicker', JSON.stringify(gameData));
        };
    </script>
</body>
</html>
